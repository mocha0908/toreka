<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>トレカキングダム 買取額検索</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #4e54c8; --accent: #ff416c; --bg: #f4f7f6; --skeleton: #e0e0e0; }
    body { font-family: 'Noto Sans JP', sans-serif; margin: 0; background: var(--bg); padding-bottom: 30px; }
    
    .header { position: sticky; top: -115px; z-index: 100; background: #fff; padding: 10px 15px; border-bottom: 1px solid #ddd; transition: top 0.2s; }
    @media (max-width: 480px) { .header { top: -130px; } }

    .search-box { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
    .main-title { text-align: center; font-size: 18px; font-weight: 900; color: var(--primary); margin-bottom: 2px; letter-spacing: 1px; }
    .update-info { text-align: center; font-size: 10px; color: #777; margin-bottom: 4px; line-height: 1.4; }
    
    .tab-row { display: flex; gap: 6px; margin-bottom: 2px; }
    .tab-btn { flex: 1; padding: 10px 0; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; font-weight: bold; color: #555; cursor: pointer; outline: none; transition: all 0.2s; }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .search-form { margin: 0; padding: 0; display: block; }
    .input-row { display: flex; background: #fff; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; position: relative; }
    .input-row input { flex: 1; border: none; outline: none; padding: 12px 35px 12px 12px; font-size: 16px; width: 100%; box-sizing: border-box; -webkit-appearance: none; }
    
    .input-row input::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
    .btn-clear { position: absolute; right: 65px; top: 50%; transform: translateY(-50%); background: #ccc; color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; padding: 0; font-weight: bold; z-index: 3; }
    
    .btn-search { background: var(--primary); color: #fff; border: none; padding: 0 15px; font-weight: bold; cursor: pointer; z-index: 2; }
    .filter-row { display: flex; gap: 8px; align-items: center; }
    .filter-row select { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ccc; font-size: 12px; outline: none; background: #fff; color: #333; }
    
    .hit-count { font-size: 11px; color: #666; font-weight: bold; white-space: nowrap; background: #eee; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; }

    .container { max-width: 600px; margin: 20px auto; padding: 0 10px; }
    .card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; gap: 15px; }
    .card-img { width: 85px; height: 85px; object-fit: contain; background: #f0f0f0; border-radius: 8px; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .rarity { font-size: 10px; color: #888; font-weight: bold; background: #eee; padding: 2px 6px; border-radius: 4px; }
    .name { font-size: 14px; font-weight: bold; margin: 6px 0; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .price { font-size: 20px; color: var(--accent); font-weight: 900; margin-bottom: 2px; }
    .limit { font-size: 11px; color: #666; font-weight: bold; margin-bottom: 10px; }
    .actions { display: flex; gap: 5px; }
    .btn { flex: 1; text-align: center; padding: 8px 0; border-radius: 6px; text-decoration: none; font-size: 11px; font-weight: bold; color: #fff; border: none; cursor: pointer; }
    .btn-mer { background: #ea352d; }
    .btn-shp { background: #333; }
    .btn-tw { background: #1DA1F2; }
    @media (max-width: 480px) { .card-img { width: 70px; height: 70px; } .price { font-size: 18px; } }

    .scroll-to-top { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: var(--primary); color: white; border: none; font-size: 18px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: none; z-index: 200; font-weight: bold; transition: opacity 0.3s; opacity: 0.9; }

    .skeleton-card { display: flex; gap: 15px; padding: 15px; background: #fff; border-radius: 12px; margin-bottom: 15px; }
    .sk-img { width: 85px; height: 85px; background: var(--skeleton); border-radius: 8px; }
    .sk-info { flex: 1; display: flex; flex-direction: column; gap: 10px; justify-content: center; }
    .sk-line { height: 12px; background: var(--skeleton); border-radius: 4px; width: 100%; }
    .sk-line.short { width: 60%; }
    .animate-pulse { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    .btn-retry { background: var(--primary); color: #fff; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 13px; }

    /* ダークモードの色設計を完全に見直し */
    @media (prefers-color-scheme: dark) {
      :root { --bg: #121212; --skeleton: #2d2d2d; }
      body { color: #e0e0e0; }
      .header, .card, .tab-btn, .skeleton-card { background: #1e1e1e; border-color: #333; color: #e0e0e0; }
      .main-title { color: #8ab4f8; }
      .update-info { color: #aaa; }
      .input-row, .input-row input { background: #2d2d2d; color: #fff; border-color: #444; }
      .filter-row select { background: #2d2d2d; color: #fff; border-color: #444; }
      .rarity, .hit-count { background: #333; color: #ccc; border-color: #444; }
      .limit { color: #aaa; }
      .card-img { background: #2d2d2d; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="search-box">
    <div class="main-title">トレカキングダム 買取額検索</div>
    <div class="update-info">
      毎日当日午前中を目安に更新予定です。<br>
      掲載されているのは更新時の価格になります。<br>
      買取上限に達した場合は返却か減額でのお査定となります。
    </div>
    
    <div class="tab-row" id="tabContainer">
      <button class="tab-btn" id="tab-psa" onclick="switchTab('psa')">PSA鑑定品等</button>
      <button class="tab-btn" id="tab-box" onclick="switchTab('box')">未開封BOX</button>
      <button class="tab-btn" id="tab-sotai" onclick="switchTab('sotai')">素体</button>
    </div>
    
    <form class="search-form" onsubmit="handleSearchSubmit(event)">
      <div class="input-row">
        <input type="search" id="keyword" placeholder="キーワード・型番を検索..." oninput="onInput()">
        <button type="button" class="btn-clear" id="btnClear" onclick="clearKeyword()">×</button>
        <button type="submit" class="btn-search">検索</button>
      </div>
    </form>
    
    <div class="filter-row">
      <select id="raritySelect" onchange="search()"><option value="">全種別・レアリティ</option></select>
      <select id="sortSelect" onchange="render()">
        <option value="default">おすすめ順（標準）</option>
        <option value="desc">価格高い順</option>
        <option value="asc">価格低い順</option>
        <option value="name_asc">名前：あ〜ん順</option>
        <option value="name_desc">名前：ん〜あ順</option>
      </select>
      <div class="hit-count" id="hitCount">0 件</div>
    </div>
  </div>
</div>

<div class="container" id="list">
  <div class="skeleton-card animate-pulse"><div class="sk-img"></div><div class="sk-info"><div class="sk-line short"></div><div class="sk-line"></div><div class="sk-line short"></div></div></div>
  <div class="skeleton-card animate-pulse"><div class="sk-img"></div><div class="sk-info"><div class="sk-line short"></div><div class="sk-line"></div><div class="sk-line short"></div></div></div>
  <div class="skeleton-card animate-pulse"><div class="sk-img"></div><div class="sk-info"><div class="sk-line short"></div><div class="sk-line"></div><div class="sk-line short"></div></div></div>
</div>

<button class="scroll-to-top" id="scrollToTop" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</button>

<script>
  const DATA_URL = "https://mocha0908.github.io/TCK-kaitori/data.json";
  const fallbackImg = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'%3E%3Crect fill='%23eeeeee' width='100' height='100'/%3E%3Ctext fill='%23999999' x='50' y='50' font-family='sans-serif' font-size='12' text-anchor='middle' dominant-baseline='middle'%3ENo Image%3C/text%3E%3C/svg%3E";

  let database = { psa: [], box: [], sotai: [] };
  let currentTab = '';
  let filteredItems = [];
  let timer;

  async function init() {
    try {
      const res = await fetch(DATA_URL + "?v=" + new Date().getTime());
      if (!res.ok) throw new Error('Network response was not ok');
      const data = await res.json();
      
      if (data.psa) {
        database.psa = data.psa.filter(item => item.status === "掲載").map((item, index) => ({
          name: item.name, code: item.code || "", rarity: item.spec || "PSA10",
          priceNum: item.sort_price, priceStr: item.price_max, limitStr: item.price_limit, image: formatImageUrl(item.img),
          originalIndex: index
        }));
      }

      if (data.box) {
        database.box = data.box.filter(item => item.status === "掲載").map((item, index) => ({
          name: item.name, code: item.code || "", rarity: item.spec || "BOX",
          priceNum: item.sort_price, priceStr: item.price_max, limitStr: item.price_limit, image: formatImageUrl(item.img),
          originalIndex: index
        }));
      }

      if (data.sotai) {
        database.sotai = data.sotai.map((item, index) => ({
          name: item.name, code: item.code || "", rarity: item.rarity || "-",
          priceNum: item.sort_price, priceStr: item.price_a, limitStr: null, image: formatImageUrl(item.img),
          originalIndex: index
        }));
      }

      if (database.psa.length === 0) document.getElementById('tab-psa').style.display = 'none';
      if (database.box.length === 0) document.getElementById('tab-box').style.display = 'none';
      if (database.sotai.length === 0) document.getElementById('tab-sotai').style.display = 'none';

      if (database.psa.length > 0) switchTab('psa');
      else if (database.box.length > 0) switchTab('box');
      else if (database.sotai.length > 0) switchTab('sotai');
      else {
        document.getElementById('list').innerHTML = `<p style="text-align:center; padding:50px; color:#999;">現在公開中のデータはありません</p>`;
        document.getElementById('raritySelect').innerHTML = '<option value="">データなし</option>';
        document.getElementById('tabContainer').style.display = 'none';
      }

    } catch(e) { 
      document.getElementById('list').innerHTML = `<p style="text-align:center; padding:50px; color:red;">データの取得に失敗しました。<br>${e.message}</p>`; 
    }
  }

  function switchTab(tabName) {
    currentTab = tabName;
    document.getElementById('tab-psa').classList.toggle('active', tabName === 'psa');
    document.getElementById('tab-box').classList.toggle('active', tabName === 'box');
    document.getElementById('tab-sotai').classList.toggle('active', tabName === 'sotai');
    
    document.getElementById('sortSelect').value = 'default';
    
    updateRarityOptions();
    search();
  }

  function updateRarityOptions() {
    const sel = document.getElementById('raritySelect');
    sel.innerHTML = '<option value="">全種別・レアリティ</option>';
    const currentData = database[currentTab] || [];
    const rarities = [...new Set(currentData.map(i => i.rarity))].filter(r => r && r !== '-').sort();
    rarities.forEach(r => {
      const opt = document.createElement('option');
      opt.value = opt.text = r;
      sel.appendChild(opt);
    });
  }

  function formatImageUrl(rawUrl) {
    if (!rawUrl) return fallbackImg;
    if (rawUrl.startsWith('data:image')) return rawUrl;
    if (rawUrl.includes('drive.google.com')) {
      const matches = rawUrl.match(/(?:id=|\/d\/)([a-zA-Z0-9-_]+)/);
      if (matches && matches[1]) {
        return `https://drive.google.com/thumbnail?id=${matches[1]}`;
      }
    }
    return rawUrl;
  }

  // 純粋な検索・フィルタ処理（無駄な連打を防ぐため引数で非同期かどうか制御可能に）
  function search() {
    const kwInput = document.getElementById('keyword');
    const kw = kwInput.value.toLowerCase().trim();
    const rar = document.getElementById('raritySelect').value;
    const currentData = database[currentTab] || [];
    
    document.getElementById('btnClear').style.display = kw ? 'flex' : 'none';
    
    filteredItems = currentData.filter(item => {
      const name = String(item.name).toLowerCase();
      const code = String(item.code).toLowerCase();
      const rarity = String(item.rarity).toLowerCase();
      if (kw && !name.includes(kw) && !code.includes(kw) && !rarity.includes(kw)) return false;
      if (rar && item.rarity !== rar) return false;
      return true;
    });
    render();
  }

  function onInput() {
    clearTimeout(timer);
    timer = setTimeout(search, 300); // ユーザーが入力中の時は300ms待つ
  }

  // スマホのEnter/検索キーを押した時：無駄な再検索をせず、タイマーをクリアしてキーボードを閉じるだけに最適化
  function handleSearchSubmit(e) {
    e.preventDefault();
    clearTimeout(timer); 
    search(); // 即時確定
    document.getElementById('keyword').blur(); 
  }

  function clearKeyword() {
    const kwInput = document.getElementById('keyword');
    kwInput.value = '';
    search();
    kwInput.focus();
  }

  function render() {
    const cont = document.getElementById('list');
    const sort = document.getElementById('sortSelect').value;
    
    document.getElementById('hitCount').innerText = `${filteredItems.length} 件`;

    // 【修正：タイポ解消】name_desc が正しく動くように修正
    filteredItems.sort((a, b) => {
      switch(sort) {
        case 'default': return a.originalIndex - b.originalIndex;
        case 'desc': return b.priceNum - a.priceNum;
        case 'asc': return a.priceNum - b.priceNum;
        case 'name_asc': return a.name.localeCompare(b.name, 'ja');
        case 'name_desc': return b.name.localeCompare(a.name, 'ja');
        default: return 0;
      }
    });

    // 検索0件時のUI親切化（クリアボタンを設置）
    if (filteredItems.length === 0) {
      cont.innerHTML = `
        <div style="text-align:center; padding:50px 10px; color:#999;">
          <p>該当するデータが見つかりませんでした。</p>
          <button class="btn-retry" onclick="clearKeyword()">検索条件をクリア</button>
        </div>
      `;
      return;
    }

    cont.innerHTML = filteredItems.map(item => {
      const queryA = item.rarity === "PSA" || item.rarity === "BOX" ? "" : item.rarity;
      const queryB = item.code || "";
      let searchQuery = `${queryA} ${queryB}`.trim();
      if (!searchQuery) searchQuery = item.name;
      
      const mercariUrl = `https://jp.mercari.com/search?keyword=${encodeURIComponent(searchQuery)}`;
      const shopUrl = `https://shop.japan-toreca.com/search?q=${encodeURIComponent(searchQuery)}`;
      const safeName = item.name.replace(/'/g, "\\'");

      let actionsHtml = '';
      if (currentTab === 'sotai') {
        actionsHtml = `
          <a href="${mercariUrl}" target="_blank" class="btn btn-mer">メルカリ</a>
          <a href="${shopUrl}" target="_blank" class="btn btn-shp">通販</a>
          <button type="button" onclick="share('${safeName}', '${item.priceStr}')" class="btn btn-tw">X共有</button>
        `;
      } else if (currentTab === 'psa') {
        actionsHtml = `
          <a href="${mercariUrl}" target="_blank" class="btn btn-mer">メルカリ</a>
          <button type="button" onclick="share('${safeName}', '${item.priceStr}')" class="btn btn-tw">X共有</button>
        `;
      } else if (currentTab === 'box') {
        actionsHtml = `
          <button type="button" onclick="share('${safeName}', '${item.priceStr}')" class="btn btn-tw">X共有</button>
        `;
      }

      const limitHtml = (item.limitStr && item.limitStr !== '-') 
        ? `<div class="limit">上限: ${item.limitStr}</div>` 
        : `<div style="margin-bottom:10px;"></div>`;

      return `
        <div class="card">
          <img src="${item.image}" class="card-img" referrerpolicy="no-referrer" loading="lazy" onerror="this.onerror=null; this.src='${fallbackImg}'">
          <div class="card-info">
            <span class="rarity">${item.rarity}</span>
            <span class="name">${item.name}</span>
            <div class="price">${item.priceStr}</div>
            ${limitHtml}
            <div class="actions">
              ${actionsHtml}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function share(name, priceStr) {
    const txt = `${name}\n買取価格: ${priceStr}\n#トレカキングダム`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(txt)}`, '_blank');
  }

  window.onscroll = function() {
    const btn = document.getElementById('scrollToTop');
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
      btn.style.display = 'block';
    } else {
      btn.style.display = 'none';
    }
  };

  init();
</script>
</body>
</html>
