<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>トレカ買取検索システム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4e54c8;
      --accent: #ff416c;
      --bg: #f4f7f6;
      --card-bg: #ffffff;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0; background: var(--bg); color: #333;
      padding-bottom: 100px;
    }
    /* ヘッダー・検索エリア */
    .header-container {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 15px; border-bottom: 1px solid #ddd;
    }
    .search-box {
      max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px;
    }
    .search-input-group {
      display: flex; gap: 8px;
    }
    input[type="search"] {
      flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;
    }
    .btn-main {
      background: var(--primary); color: #fff; border: none; padding: 0 20px;
      border-radius: 8px; font-weight: bold; cursor: pointer;
    }
    .filter-group {
      display: flex; gap: 10px; font-size: 12px;
    }
    select { padding: 5px; border-radius: 5px; border: 1px solid #ccc; flex: 1; }

    /* リストエリア */
    .content { max-width: 800px; margin: 20px auto; padding: 0 15px; }
    .card-item {
      background: var(--card-bg); border-radius: 12px; padding: 15px;
      margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      display: flex; gap: 15px; align-items: center;
    }
    .card-img { width: 70px; height: 70px; border-radius: 8px; object-fit: contain; background: #eee; }
    .card-info { flex: 1; }
    .card-name { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
    .card-price { font-family: 'Roboto', sans-serif; font-size: 18px; color: var(--accent); font-weight: 900; }
    .fav-btn { font-size: 24px; cursor: pointer; color: #ccc; user-select: none; }
    .fav-btn.active { color: #f1c40f; }

    /* 合計バー */
    #totalBar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 2px solid var(--primary);
      padding: 15px 20px; display: none; justify-content: space-between; align-items: center;
    }
  </style>
</head>
<body onload="init()">

<div class="header-container">
  <div class="search-box">
    <div class="search-input-group">
      <input type="search" id="keyword" placeholder="カード名で検索..." oninput="onInputDebounce()">
      <button class="btn-main" onclick="doSearch()">検索</button>
    </div>
    <div class="filter-group">
      <select id="raritySelect" onchange="doSearch()">
        <option value="">全てのレアリティ</option>
      </select>
      <select id="sortSelect" onchange="renderList()">
        <option value="desc">価格が高い順</option>
        <option value="asc">価格が低い順</option>
      </select>
      <button id="favFilterBtn" onclick="toggleFavFilter()" style="cursor:pointer">★のみ</button>
    </div>
  </div>
</div>

<div class="content" id="list">
  <p style="text-align:center; color: #999;">データを読み込み中...</p>
</div>

<div id="totalBar">
  <div id="totalText" style="font-weight:bold;">合計 0点: ¥0</div>
  <button class="btn-main" style="padding: 10px;" onclick="copyToClipboard()">リストをコピー</button>
</div>

<script>
  // GASウェブアプリのURL
  const API_URL = "https://script.google.com/macros/s/AKfycbzv2wolJO2p6GHnYD6LjUITECV7GEx2DemWL3IJUE-C7GttkQ-7fn6rTDAZaxmUr77n/exec";

  let allData = [];
  let favorites = new Set();
  let showFavOnly = false;
  let timer;

  async function init() {
    // レアリティリストの取得
    fetch(`${API_URL}?action=rarityList`).then(r => r.json()).then(list => {
      const sel = document.getElementById('raritySelect');
      list.forEach(r => {
        const opt = document.createElement('option');
        opt.value = opt.text = r;
        sel.appendChild(opt);
      });
    });
    // 初期データの読み込み
    await doSearch();
  }

  async function doSearch() {
    const kw = document.getElementById('keyword').value;
    const rar = document.getElementById('raritySelect').value;
    const res = await fetch(`${API_URL}?action=search&keyword=${encodeURIComponent(kw)}&rarity=${encodeURIComponent(rar)}`);
    const json = await res.json();
    allData = json.rows || [];
    renderList();
  }

  function onInputDebounce() {
    clearTimeout(timer);
    timer = setTimeout(doSearch, 500);
  }

  function renderList() {
    const listEl = document.getElementById('list');
    const sort = document.getElementById('sortSelect').value;
    
    let displayData = allData.filter(item => !showFavOnly || favorites.has(item.name));
    
    displayData.sort((a, b) => sort === 'desc' ? b.price - a.price : a.price - b.price);

    if (displayData.length === 0) {
      listEl.innerHTML = '<p style="text-align:center; padding:50px;">該当するカードがありません</p>';
      return;
    }

    listEl.innerHTML = displayData.map(item => `
      <div class="card-item">
        <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/70?text=No+Img'">
        <div class="card-info">
          <div class="card-name">${item.name}</div>
          <div class="card-price">¥${item.price.toLocaleString()}</div>
        </div>
        <div class="fav-btn ${favorites.has(item.name) ? 'active' : ''}" onclick="toggleFav('${item.name}')">★</div>
      </div>
    `).join('');
    
    updateTotalBar();
  }

  function toggleFav(name) {
    if (favorites.has(name)) favorites.delete(name);
    else favorites.add(name);
    renderList();
  }

  function toggleFavFilter() {
    showFavOnly = !showFavOnly;
    document.getElementById('favFilterBtn').style.background = showFavOnly ? '#f1c40f' : '#eee';
    renderList();
  }

  function updateTotalBar() {
    const bar = document.getElementById('totalBar');
    if (favorites.size > 0) {
      bar.style.display = 'flex';
      let total = 0;
      allData.forEach(item => {
        if (favorites.has(item.name)) total += item.price;
      });
      document.getElementById('totalText').innerText = `選択中 ${favorites.size}点: ¥${total.toLocaleString()}`;
    } else {
      bar.style.display = 'none';
    }
  }

  function copyToClipboard() {
    let text = "【買取希望リスト】\n";
    let total = 0;
    allData.forEach(item => {
      if (favorites.has(item.name)) {
        text += `・${item.name} : ¥${item.price.toLocaleString()}\n`;
        total += item.price;
      }
    });
    text += `合計金額: ¥${total.toLocaleString()}`;
    navigator.clipboard.writeText(text).then(() => alert("コピーしました！"));
  }
</script>

</body>
</html>
