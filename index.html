<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>トレカキングダム 買取検索</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4e54c8;
      --primary-grad: linear-gradient(135deg, #4e54c8 0%, #8f94fb 100%);
      --accent: #ff416c;
      --bg: #f4f7f6;
      --text: #2d3436;
      --card-bg: #ffffff;
      --shadow-soft: 0 8px 20px rgba(0,0,0,0.04);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      margin: 0; background: var(--bg); color: var(--text);
      padding-bottom: 40px;
    }
    .sticky-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(244, 247, 246, 0.95);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      padding: 10px 15px; border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .search-outer { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
    .search-bar {
      display: flex; background: #fff; border-radius: 12px;
      padding: 5px; border: 1px solid #eee; box-shadow: var(--shadow-soft);
    }
    .search-bar input { flex: 1; border: none; outline: none; padding: 10px; font-size: 16px; width: 100%; }
    .btn-search { background: var(--primary-grad); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    
    .controls { display: flex; gap: 8px; }
    .select-wrapper { flex: 1; background: #fff; border: 1px solid #eee; border-radius: 8px; padding: 8px; font-size: 12px; }
    .select-wrapper select { width: 100%; border: none; outline: none; background: transparent; cursor: pointer; }

    .content { max-width: 840px; margin: 0 auto; padding: 20px 15px; }
    .item-row {
      background: var(--card-bg); border-radius: 16px; padding: 16px;
      margin-bottom: 16px; box-shadow: var(--shadow-soft);
      display: flex; gap: 16px; align-items: flex-start;
    }
    .item-img { width: 90px; height: 90px; flex-shrink: 0; background: #f8f9fa; border-radius: 12px; overflow: hidden; }
    .item-img img { width: 100%; height: 100%; object-fit: contain; }
    
    .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .rarity-badge { font-size: 10px; background: #eee; padding: 2px 6px; border-radius: 4px; color: #666; width: fit-content; }
    .item-name { font-size: 15px; font-weight: 700; line-height: 1.4; color: #333; }
    .price-val { font-family: 'Roboto', sans-serif; font-size: 22px; font-weight: 900; color: var(--accent); margin-bottom: 8px; }

    /* アクションボタン */
    .item-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn-action {
      flex: 1; min-width: 80px; padding: 8px 0; border-radius: 6px;
      text-decoration: none; font-size: 11px; font-weight: 700;
      color: white; text-align: center; cursor: pointer; border: none;
    }
    .btn-mercari { background: #ea352d; }
    .btn-shop { background: #222; }
    .btn-share { background: #1DA1F2; }

    @media (max-width: 480px) {
      .item-row { flex-direction: column; align-items: center; text-align: center; }
      .item-info { width: 100%; align-items: center; }
      .item-actions { width: 100%; }
    }
  </style>
</head>
<body onload="init()">

<div class="sticky-header">
  <div class="search-outer">
    <div class="search-bar">
      <input type="search" id="keyword" placeholder="カード名を入力" oninput="onInputDebounce()">
      <button class="btn-search" onclick="search()">検索</button>
    </div>
    <div class="controls">
      <div class="select-wrapper">
        <select id="raritySelect" onchange="search()"><option value="">全てのレアリティ</option></select>
      </div>
      <div class="select-wrapper">
        <select id="sortSelect" onchange="renderList()">
          <option value="desc">価格が高い順</option>
          <option value="asc">価格が低い順</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="content" id="resultList">
  <p style="text-align:center; color:#999; margin-top:50px;">読み込み中...</p>
</div>

<script>
  // あなたのGAS URL
  const API_URL = "https://script.google.com/macros/s/AKfycbzv2wolJO2p6GHnYD6LjUITECV7GEx2DemWL3IJUE-C7GttkQ-7fn6rTDAZaxmUr77n/exec";

  let allData = [];
  let timer;

  async function init() {
    try {
      const res = await fetch(`${API_URL}?action=rarityList`);
      const list = await res.json();
      const sel = document.getElementById('raritySelect');
      list.forEach(r => {
        const opt = document.createElement('option');
        opt.value = opt.text = r;
        sel.appendChild(opt);
      });
    } catch(e) {}
    await search();
  }

  async function search() {
    const kw = document.getElementById('keyword').value;
    const rar = document.getElementById('raritySelect').value;
    try {
      const res = await fetch(`${API_URL}?action=search&keyword=${encodeURIComponent(kw)}&rarity=${encodeURIComponent(rar)}`);
      const data = await res.json();
      allData = data.rows || [];
      renderList();
    } catch(e) {
      document.getElementById('resultList').innerHTML = "データの取得に失敗しました。";
    }
  }

  function onInputDebounce() {
    clearTimeout(timer);
    timer = setTimeout(search, 500);
  }

  function renderList() {
    const container = document.getElementById('resultList');
    const sort = document.getElementById('sortSelect').value;

    allData.sort((a, b) => sort === 'desc' ? b.price - a.price : a.price - b.price);

    if(allData.length === 0) {
      container.innerHTML = `<p style="text-align:center; padding:40px; color:#999;">該当なし</p>`;
      return;
    }

    container.innerHTML = allData.map(row => {
      const mercariUrl = `https://jp.mercari.com/search?keyword=${encodeURIComponent(row.name)}`;
      const shopUrl = `https://shop.japan-toreca.com/search?q=${encodeURIComponent(row.name)}`;
      
      return `
        <div class="item-row">
          <div class="item-img"><img src="${row.image}" onerror="this.src='https://via.placeholder.com/100?text=No+Img'"></div>
          <div class="item-info">
            <span class="rarity-badge">${row.rarity || '－'}</span>
            <div class="item-name">${row.name}</div>
            <div class="price-val">¥${row.price.toLocaleString()}</div>
            <div class="item-actions">
              <a href="${mercariUrl}" target="_blank" class="btn-action btn-mercari">メルカリ</a>
              <a href="${shopUrl}" target="_blank" class="btn-action btn-shop">通販サイト</a>
              <button onclick="shareOnX('${row.name}', '${row.price}')" class="btn-action btn-share">Xでシェア</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function shareOnX(name, price) {
    const text = `👑トレカキングダム 買取情報👑\n\n${name}\n【買取価格 ¥${Number(price).toLocaleString()}】\n\n#ポケカ #秋葉原`;
    const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    window.open(url, '_blank');
  }
</script>
</body>
</html>
